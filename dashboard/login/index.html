     render();\n      try {\n        const response = await customFetch(GAS_SALES_URL, {\n          method: \"POST\",\n\n          body: JSON.stringify({\n            action: \"add\",\n            category: data.category,\n            companyName: data.companyName,\n            contactPerson: data.contactPerson,\n            phoneNumber: data.phoneNumber,\n            notes: data.notes,\n            contacted: data.contacted\n          })\n        });\n        const result = await response.json();\n        if (!result.success) {\n          throw new Error(result.message || \"Add failed\");\n        }\n        showToast(\"Lead added successfully\");\n        localStorage.setItem(\"sales_cache\", JSON.stringify(sales));\n      } catch (error) {\n        sales = sales.filter(x =\u003e x.id !== tempLead.id);\n        render();\n        showToast(error.message || \"Failed to add lead\", \"error\");\n        console.error(error);\n      }\n    }\n\n    async function updateSale(id, data) {\n      const index = sales.findIndex(x =\u003e String(x.id) === String(id));\n      if (index === -1) return;\n      const oldData = { ...sales[index] };\n      sales[index] = { ...sales[index], ...data };\n      render();\n      try {\n        const response = await customFetch(GAS_SALES_URL, {\n          method: \"POST\",\n\n          body: JSON.stringify({\n            action: \"update\",\n            id,\n            category: data.category,\n            companyName: data.companyName,\n            contactPerson: data.contactPerson,\n            phoneNumber: data.phoneNumber,\n            notes: data.notes,\n            contacted: data.contacted\n          })\n        });\n        const result = await response.json();\n        if (!result.success) {\n          throw new Error(result.message || \"Update failed\");\n        }\n        showToast(\"Lead updated successfully\");\n        localStorage.setItem(\"sales_cache\", JSON.stringify(sales));\n      } catch (error) {\n        sales[index] = oldData;\n        render();\n        showToast(error.message || \"Failed to save changes\", \"error\");\n        console.error(error);\n      }\n    }\n\n    async function deleteSale(id) {\n      const deletedLead = sales.find(x =\u003e String(x.id) === String(id));\n      sales = sales.filter(x =\u003e String(x.id) !== String(id));\n      render();\n      try {\n        const response = await customFetch(GAS_SALES_URL, {\n          method: \"POST\",\n\n          body: JSON.stringify({\n            action: \"delete\",\n            id\n          })\n        });\n        const result = await response.json();\n        if (!result.success) {\n          throw new Error(result.message || \"Delete failed\");\n        }\n        showToast(\"Lead deleted successfully\");\n        localStorage.setItem(\"sales_cache\", JSON.stringify(sales));\n      } catch (error) {\n        sales.unshift(deletedLead);\n        render();\n        showToast(error.message || \"Failed to delete lead\", \"error\");\n        console.error(error);\n      }\n    }\n\n    async function handleSalesImport(event) {\n      const file = event.target.files[0];\n      if (!file) return;\n      const reader = new FileReader();\n      reader.onload = async (e) =\u003e {\n        const workbook = XLSX.read(e.target.result, { type: \"array\" });\n        const sheet = workbook.Sheets[workbook.SheetNames[0]];\n        const rows = XLSX.utils.sheet_to_json(sheet);\n        if (!rows.length) {\n          showToast(\"No records found\", \"error\");\n          return;\n        }\n        showToast(`Importing ${rows.length} leads...`);\n        for (const row of rows) {\n          await addSale({\n            category: row.Category || \"\",\n            companyName: row.CompanyName || row.Company || \"\",\n            contactPerson: row.ContactPerson || \"\",\n            phoneNumber: row.PhoneNumber || row.Phone || \"\",\n            notes: row.Notes || \"\",\n            contacted: row.Contacted || \"No\"\n          });\n        }\n        showToast(`${rows.length} leads imported successfully`);\n      };\n      reader.readAsArrayBuffer(file);\n    }\n\n    // ==============================\n    // RENDER FUNCTIONS\n    // ==============================\n    function render() {\n      const currentUser = getCurrentUser();\n\n      const role = currentUser?.role?.toLowerCase();\n\n      if (\n        role === \"sales\" \u0026\u0026\n        page !== \"sales\"\n      ) {\n        page = \"sales\";\n      } else if (\n        role === \"blogger\" \u0026\u0026\n        page !== \"blogs\" \u0026\u0026\n        page !== \"create-blog\" \u0026\u0026\n        page !== \"blog-categories\"\n      ) {\n        page = \"blogs\";\n      }\n      if (isLoggedIn()) {\n        resetLogoutTimer();\n      }\n      const root = document.getElementById('root');\n      if (!isLoggedIn()) {\n\n        root.innerHTML =\n          renderLogin() +\n          (sessionExpired\n            ? renderSessionExpiredModal()\n            : \"\");\n\n        attachLogin();\n        attachSessionExpiredEvents();\n\n        return;\n      }\n      root.innerHTML = `\n        \u003cdiv class=\"app\"\u003e\n          ${renderSidebar()}\n          \u003cdiv class=\"main${sidebarCollapsed ? ' collapsed' : ''}\"\u003e\n            ${renderTopbar()}\n            \u003cdiv class=\"content\"\u003e\n              ${page === 'dashboard' ? renderDashboard() : page === 'clients' ? renderClients() : page === 'analytics' ? renderAnalytics() : page === 'users' ? renderUsers() : page === 'sales' ? renderSales() : page === 'blogs' ? renderBlogs() : page === 'create-blog' ? renderCreateBlog() : page === 'blog-categories' ? renderBlogCategories() : ''}\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n        ${modal ? renderModal() : ''}\n        ${mobileMenuOpen ? renderMobileMenu() : ''}\n        ${toast ? `\u003cdiv class=\"toast ${toast.type}\"\u003e\u003cimg class=\"toast-icon\" src=\"/assets/icons/${toast.type === 'success' ? 'check.svg' : 'close.svg'}\" alt=\"${toast.type}\"\u003e\u003cspan\u003e${toast.msg}\u003c/span\u003e\u003c/div\u003e` : ''}\n      `;\n      attachEvents();\n      if (page === 'analytics') initCharts();\n    }\n\n    function renderLogin() {\n      return `\u003cdiv class=\"login-wrap\"\u003e\u003cdiv class=\"login-card\"\u003e\u003cdiv class=\"login-logo\"\u003e\u003ca href=\"#\" class=\"logo\"\u003e\u003cdiv\u003e\u003cimg src=\"/assets/logo.svg\" alt=\"ReelScale Logo\" style=\"width:100%; height:20px;\"\u003e\u003c/div\u003e\u003c/a\u003e\u003c/div\u003e\u003cdiv class=\"login-title\"\u003eWelcome back\u003c/div\u003e\u003cdiv class=\"login-sub\"\u003eSign in to manage your clients \u0026 revenue\u003c/div\u003e\u003cdiv id=\"login-err\" style=\"display:none\" class=\"login-error\"\u003eInvalid credentials. Please try again.\u003c/div\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003eEmail\u003c/label\u003e\u003cinput class=\"form-input\" id=\"l-email\" type=\"email\" placeholder=\"Enter your email\" autocomplete=\"off\"\u003e\u003c/div\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003ePassword\u003c/label\u003e\u003cinput class=\"form-input\" id=\"l-pass\" type=\"password\" placeholder=\"Enter your password\" autocomplete=\"off\"\u003e\u003c/div\u003e\u003cbutton class=\"btn btn-primary al-c\" id=\"login-btn\" style=\"width:100%;padding:12px;margin-top:32px;font-size:14px\"\u003eSign In\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e`;\n    }\n\n    function renderSessionExpiredModal() {\n      return `\n    \u003cdiv class=\"modal-overlay\"\u003e\n      \u003cdiv class=\"modal\" style=\"max-width:420px\"\u003e\n\n        \u003cdiv class=modal-icon\u003e\n          \u003cimg src=\"/assets/icons/log-out.svg\" alt=\"Info\" width=\"24\" height=\"24\"\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"modal-header\"\u003e\n          \u003cdiv class=\"modal-title\"\u003e\n            Session Expired\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv style=\"\n          color: var(--muted);\n          font-size: var(--text-sm);\n          line-height: 1.6;\n          margin-bottom: 24px;\n        \"\u003e\n          Your session expired due to inactivity.\n          Please sign in again to continue using ReelScale.\n        \u003c/div\u003e\n\n        \u003cdiv class=\"form-footer\"\u003e\n          \u003cbutton\n            id=\"session-login-btn\"\n            class=\"btn btn-primary\"\n          \u003e\n            Login Again\n          \u003c/button\u003e\n        \u003c/div\u003e\n\n      \u003c/div\u003e\n    \u003c/div\u003e\n  `;\n    }\n\n    function renderSidebar() {\n      const user = getCurrentUser();\n      const collapsed = sidebarCollapsed;\n      const baseIconPath = \"/assets/icons/\";\n      const role = user?.role?.toLowerCase();\n\n      const nav = role === \"sales\"\n        ? [{ id: \"sales\", icon: baseIconPath + \"nav-sales.svg\", label: \"Sales\" }]\n        : role === \"blogger\"\n          ? [\n            { id: \"blogs\", icon: baseIconPath + \"reels.svg\", label: \"Blogs\" }\n          ]\n          : [\n            { id: \"dashboard\", icon: baseIconPath + \"nav-dashboard.svg\", label: \"Dashboard\" },\n            { id: \"clients\", icon: baseIconPath + \"nav-clients.svg\", label: \"Clients\" },\n            { id: \"analytics\", icon: baseIconPath + \"nav-analytics.svg\", label: \"Analytics\" },\n            { id: \"users\", icon: baseIconPath + \"nav-users.svg\", label: \"Users\" },\n            { id: \"sales\", icon: baseIconPath + \"nav-sales.svg\", label: \"Sales\" },\n            { id: \"blogs\", icon: baseIconPath + \"reels.svg\", label: \"Blogs\" }\n          ];\n\n      return `\n        \u003cdiv class=\"sidebar${collapsed ? ' collapsed' : ''}\"\u003e\n          \u003cbutton class=\"sidebar-toggle\" id=\"sidebar-toggle\" aria-label=\"${collapsed ? 'Expand' : 'Collapse'} sidebar\" title=\"${collapsed ? 'Expand' : 'Collapse'}\"\u003e\u003c/button\u003e\n          \u003cdiv class=\"dashboard-logo\"\u003e\n            \u003cimg src=\"${collapsed ? '/assets/r_light.svg' : '/assets/logo.svg'}\" alt=\"ReelScale Logo\"\u003e\n            \u003cdiv class=\"logo-sub\"\u003eReel Production House\u003c/div\u003e\n          \u003c/div\u003e\n          \u003cdiv class=\"nav\"\u003e\n            ${nav.map(n =\u003e {\n        if (n.isHeader) {\n          return collapsed ? '\u003cdiv style=\"margin: 12px 0; border-top: 1px solid var(--border)\"\u003e\u003c/div\u003e' : `\u003cdiv style=\"padding: 16px 16px 8px; font-size: 11px; font-weight: 700; color: var(--muted);\"\u003e${n.label}\u003c/div\u003e`;\n        }\n        return `\n                \u003cbutton class=\"nav-item${page === n.id ? ' active' : ''}\" data-page=\"${n.id}\"${collapsed ? ` data-tooltip=\"${n.label}\"` : ''}\u003e\n                  \u003cimg src=\"${n.icon}\" alt=\"${n.label}\" class=\"nav-icon\"\u003e\n                  \u003cspan class=\"nav-label\"\u003e${n.label}\u003c/span\u003e\n                \u003c/button\u003e\n              `;\n      }).join('')}\n          \u003c/div\u003e\n          \u003cdiv class=\"sidebar-footer\"\u003e\n            \u003cdiv class=\"user-pill\"\u003e\n              \u003cdiv class=\"user-avatar\"\u003e${(user?.name || 'A')[0]}\u003c/div\u003e\n              \u003cdiv class=\"user-info\"\u003e\n                \u003cdiv class=\"user-name\"\u003e${user?.name || ''}\u003c/div\u003e\n                \u003cdiv class=\"user-role\"\u003e${user?.role || ''} (${user?.email || ''})\u003c/div\u003e\n              \u003c/div\u003e\n              \u003cspan class=\"logout-btn-wrap\"${collapsed ? ' data-tooltip=\"Logout\"' : ''}\u003e\n                \u003cimg src=\"/assets/icons/log-out.svg\" alt=\"Logout\" class=\"logout-btn\" id=\"logout-btn\" title=\"Logout\"\u003e\n              \u003c/span\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      `;\n    }\n\n    function renderMobileMenu() {\n      const user = getCurrentUser();\n      const role = user?.role?.toLowerCase();\n\n      const nav = role === \"sales\"\n        ? [\n          {\n            id: \"sales\",\n            icon: \"/assets/icons/nav-sales.svg\",\n            label: \"Sales\"\n          }\n        ]\n        : role === \"blogger\"\n          ? [\n            {\n              id: \"blogs\",\n              icon: \"/assets/icons/reels.svg\",\n              label: \"Blogs\"\n            }\n          ]\n          : [\n            {\n              id: \"dashboard\",\n              icon: \"/assets/icons/nav-dashboard.svg\",\n              label: \"Dashboard\"\n            },\n            {\n              id: \"clients\",\n              icon: \"/assets/icons/nav-clients.svg\",\n              label: \"Clients\"\n            },\n            {\n              id: \"analytics\",\n              icon: \"/assets/icons/nav-analytics.svg\",\n              label: \"Analytics\"\n            },\n            {\n              id: \"users\",\n              icon: \"/assets/icons/nav-users.svg\",\n              label: \"Users\"\n            },\n            {\n              id: \"sales\",\n              icon: \"/assets/icons/nav-sales.svg\",\n              label: \"Sales\"\n            },\n            {\n              id: \"blogs\",\n              icon: \"/assets/icons/reels.svg\",\n              label: \"Blogs\"\n            }\n          ];\n      return `\u003cdiv class=\"mobile-menu-overlay\" id=\"mobile-menu-overlay\"\u003e\u003cdiv class=\"mobile-menu\"\u003e\u003cdiv class=\"mobile-menu-header\"\u003e\u003cimg src=\"/assets/logo.svg\" height=\"22\"\u003e\u003cbutton id=\"mobile-close-btn\" class=\"mobile-close-btn\"\u003e\u003cimg src=\"/assets/icons/close.svg\" alt=\"Close\" width=\"18\" height=\"18\"\u003e\u003c/button\u003e\u003c/div\u003e${nav.map(item =\u003e `\u003cbutton class=\"mobile-nav-item ${page === item.id ? \"active\" : \"\"}\" data-page=\"${item.id}\"\u003e\u003cimg src=\"${item.icon}\" width=\"18\"\u003e${item.label}\u003c/button\u003e`).join(\"\")}\u003c/div\u003e\u003c/div\u003e`;\n    }\n\n    function renderSkeleton(type) {\n      if (type === 'dashboard') {\n        return '\u003cdiv class=\"skeleton-stat-grid\"\u003e' +\n          '\u003cdiv class=\"skeleton-stat-card\"\u003e\u003cdiv class=\"skeleton-line skeleton\"\u003e\u003c/div\u003e\u003cdiv class=\"skeleton-line skeleton\" style=\"width:40%\"\u003e\u003c/div\u003e\u003c/div\u003e' +\n          '\u003cdiv class=\"skeleton-stat-card\"\u003e\u003cdiv class=\"skeleton-line skeleton\"\u003e\u003c/div\u003e\u003cdiv class=\"skeleton-line skeleton\" style=\"width:40%\"\u003e\u003c/div\u003e\u003c/div\u003e' +\n          '\u003cdiv class=\"skeleton-stat-card\"\u003e\u003cdiv class=\"skeleton-line skeleton\"\u003e\u003c/div\u003e\u003cdiv class=\"skeleton-line skeleton\" style=\"width:40%\"\u003e\u003c/div\u003e\u003c/div\u003e' +\n          '\u003c/div\u003e' +\n          '\u003cdiv class=\"skeleton-grid-2\"\u003e' +\n          '\u003cdiv class=\"skeleton-glass-card\"\u003e' +\n          '\u003cdiv class=\"skeleton-line skeleton\"\u003e\u003c/div\u003e' +\n          '\u003cdiv class=\"skeleton-block skeleton\" style=\"height:40px\"\u003e\u003c/div\u003e'.repeat(5) +\n          '\u003c/div\u003e' +\n          '\u003cdiv class=\"skeleton-glass-card\"\u003e' +\n          '\u003cdiv class=\"skeleton-line skeleton\"\u003e\u003c/div\u003e' +\n          '\u003cdiv class=\"skeleton-block skeleton\" style=\"height:40px\"\u003e\u003c/div\u003e'.repeat(5) +\n          '\u003c/div\u003e' +\n          '\u003c/div\u003e';\n      }\n      if (type === 'clients') {\n        return '\u003cdiv class=\"skeleton-controls\"\u003e' +\n          '\u003cdiv class=\"skeleton-line skeleton\" style=\"height:38px; width:260px;\"\u003e\u003c/div\u003e' +\n          '\u003cdiv class=\"skeleton-line skeleton\ 00\"\u003e₹${rev.toLocaleString()} \u003cspan style=\"color:var(--muted);font-weight:400\"\u003e(${pct}%)\u003c/span\u003e\u003c/span\u003e\u003c/div\u003e\u003cdiv class=\"rev-bar\"\u003e\u003cdiv class=\"rev-bar-fill\" style=\"width:${pct}%\"\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e`; }).join('')}\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e`;\n    }\n\n    function renderUsers() {\n      if (!usersLoaded) {\n\n        return renderSkeleton('users');\n      }\n      return `\n    \u003cdiv class=\"table-wrap\"\u003e\n\u003ctable class=\"users-table\"\u003e        \n  \u003cthead\u003e\n          \u003ctr\u003e\n            \u003cth\u003eID\u003c/th\u003e\n            \u003cth\u003eName\u003c/th\u003e\n            \u003cth\u003eEmail\u003c/th\u003e\n            \u003cth\u003ePassword\u003c/th\u003e\n            \u003cth\u003eRole\u003c/th\u003e\n            \u003cth style=\"width:120px\"\u003eActions\u003c/th\u003e\n          \u003c/tr\u003e\n        \u003c/thead\u003e\n\n        \u003ctbody\u003e\n\n          ${newUserRow ? `\n          \u003ctr class=\"new-user-row\"\u003e\n            \u003ctd\u003eAuto\u003c/td\u003e\n\n            \u003ctd\u003e\n              \u003cinput id=\"new-user-name\"\n                class=\"user-input\"\n                placeholder=\"Name\"\u003e\n            \u003c/td\u003e\n\n            \u003ctd\u003e\n              \u003cinput id=\"new-user-email\"\n                class=\"user-input\"\n                placeholder=\"Email\"\u003e\n            \u003c/td\u003e\n\n            \u003ctd\u003e\n              \u003cdiv class=\"password-wrap\"\u003e\n                \u003cinput\n                  id=\"new-user-password\"\n                  type=\"password\"\n                  class=\"user-input password-input\"\n                  placeholder=\"Password\"\u003e\n\n                \u003cimg\n                  src=\"/assets/icons/eye.svg\"\n                  class=\"toggle-password\"\n                  data-target=\"new-user u0026 cd \u003c salesDateFrom) {\n          return false;\n        }\n        if (salesDateTo \u0026\u0026 cd \u003e salesDateTo) {\n          return false;\n        }\n        return true;\n      });\n      return `\u003cdiv class=\"sales-date-filter-panel\" style=\"${salesFilterExpanded ? 'display:flex;' : 'display:none;'} margin-bottom: 16px;\"\u003e\n          \u003cdiv class=\"sales-date-filter\" style=\"margin-top:0;margin-bottom:0;width:100%;\"\u003e\n            \u003cdiv class=\"date-filter-group\"\u003e\n              \u003clabel class=\"date-filter-label\"\u003eFrom\u003c/label\u003e\n              \u003cinput type=\"date\" id=\"sales-date-from\" class=\"date-filter-input\" value=\"${salesDateFrom}\"\u003e\n            \u003c/div\u003e\n            \u003cdiv class=\"date-filter-group\"\u003e\n              \u003clabel class=\"date-filter-label\"\u003eTo\u003c/label\u003e\n              \u003cinput type=\"date\" id=\"sales-date-to\" class=\"date-filter-input\" value=\"${salesDateTo}\"\u003e\n            \u003c/div\u003e\n            ${salesDateFrom || salesDateTo ? `\u003cbutton id=\"clear-sales-date\" class=\"btn btn-ghost btn-sm\"\u003eClear\u003c/button\u003e` : ''}\n          \u003c/div\u003e\n        \u003c/div\u003e\n        \u003cdiv class=\"table-wrap\"\u003e\u003ctable class=\"sales-table\"\u003e\u003cthead\u003e\u003ctr\u003e\u003cth class=\"dn\"\u003eID\u003c/th\u003e\u003cth class=\"dn\"\u003eCategory\u003c/th\u003e\u003cth\u003eCompany Name\u003c/th\u003e\u003cth class=\"dn\"\u003eContact Person\u003c/th\u003e\u003cth\u003ePhone Number\u003c/th\u003e\u003cth\u003eNotes\u003c/th\u003e\u003cth\u003eCreated Date\u003c/th\u003e\u003cth\u003eContacted\u003c/th\u003e\u003cth style=\"width:120px\"\u003eActions\u003c/th\u003e\u003c/tr\u003e\u003c/thead\u003e\u003ctbody\u003e${newLeadRow ? `\u003ctr class=\"new-lead-row\"\u003e\u003ctd class=\"dn\"\u003e\u003c/td\u003e\u003ctd class=\"dn\"\u003e\u003c/td\u003e\u003ctd\u003e\u003cinput id=\"new-company\" class=\"company-input\" placeholder=\"Company Name\"\u003e\u003c/td\u003e\u003ctd class=\"dn\"\u003e\u003c/td\u003e\u003ctd\u003e\u003cinput id=\"new-phone\" class=\"phone-input\" placeholder=\"Phone Number\"\u003e\u003c/td\u003e\u003ctd\u003e\u003cinput id=\"new-note\" class=\"note-input\" placeholder=\"Notes\"\u003e\u003c/td\u003e\u003ctd\u003e\u003c/td\u003e\u003ctd\u003e\u003cinput type=\"checkbox\" id=\"new-contacted\" class=\"contacted-toggle\"\u003e\u003c/td\u003e\u003ctd\u003e\u003cdiv class=\"action-btns\"\u003e\u003cimg src=\"/assets/icons/check.svg\" class=\"create-lead-btn\" title=\"Create Lead\" style=\"cursor:pointer\"\u003e\u003cimg src=\"/assets/icons/close.svg\" class=\"cancel-lead-btn\" title=\"Cancel\" style=\"cursor:pointer\"\u003e\u003c/div\u003e\u003c/td\u003e\u003c/tr\u003e` : \"\"}${filteredSales.length === 0 ? `\u003ctr\u003e\u003ctd colspan=\"9\"\u003e\u003cdiv class=\"empty\"\u003e\u003cdiv class=\"empty-icon\"\u003e◎\u003c/div\u003e\u003cdiv class=\"empty-text\"\u003eNo leads found${salesDateFrom || salesDateTo ? ' for selected date range' : ''}\u003c/div\u003e\u003c/div\u003e\u003c/td\u003e\u003c/tr\u003e` : filteredSales.map(item =\u003e `\u003ctr\u003e\u003ctd class=\"dn\"\u003e${item.id}\u003c/td\u003e\u003ctd class=\"dn\"\u003e\u003cspan class=\"badge badge-gold\"\u003e${item.category}\u003c/span\u003e\u003c/td\u003e\u003ctd\u003e\u003cinput type=\"text\" class=\"company-input\" data-id=\"${item.id}\" value=\"${item.companyName || ''}\" placeholder=\"Company Name\"\u003e\u003c/td\u003e\u003ctd class=\"dn\"\u003e${item.contactPerson}\u003c/td\u003e\u003ctd\u003e\u003cinput type=\"text\" class=\"phone-input\" data-id=\"${item.id}\" value=\"${item.phoneNumber || ''}\" placeholder=\"Phone Number\"\u003e\u003c/td\u003e\u003ctd\u003e\u003cinput type=\"text\" class=\"note-input\" data-id=\"${item.id}\" value=\"${item.notes || ''}\" title=\"${item.notes || 'No notes added'}\" placeholder=\"Add note...\" style=\"width:100%;padding:8px 12px; lishedDate || \"\";\n        const valB = b.publishedDate || \"\";\n        return valA.localeCompare(valB) * blogSortDir;\n      });\n\n      return `\n        \u003cdiv class=\"controls\"\u003e\n          \u003cdiv class=\"search-wrap\"\u003e\n            \u003cimg src=\"/assets/icons/search.svg\" alt=\"Search\" style=\"width:16px;position:absolute;left:12px;top:50%;transform:translateY(-50%)\"\u003e\n            \u003cinput id=\"blog-search-input\" placeholder=\"Search blogs by title...\" value=\"${blogSearch}\" class=\"form-input\" style=\"padding-left:36px\"\u003e\n          \u003c/div\u003e\n          \n          \u003cdiv class=\"df-g8\"\u003e\n            \u003cselect id=\"blog-status-filter\" class=\"form-input\" style=\"width:140px;height:38px;\"\u003e\n              \u003coption value=\"all\" ${blogStatusFilter === \"all\" ? \"selected\" : \"\"}\u003eAll Statuses\u003c/option\u003e\n              \u003coption value=\"Draft\" ${blogStatusFilter === \"Draft\" ? \"selected\" : \"\"}\u003eDraft\u003c/option\u003e\n              \u003coption value=\"Published\" ${blogStatusFilter === \"Published\" ? \"selected\" : \"\"}\u003ePublished\u003c/option\u003e\n            \u003c/select\u003e\n            \n            \u003cselect id=\"blog-category-filter\" class=\"form-input\" style=\"width:160px;height:38px;\"\u003e\n              \u003coption value=\"all\" ${blogCategoryFilter === \"all\" ? \"selected\" : \"\"}\u003eAll Categories\u003c/option\u003e\n              ${blogCategories.map(c =\u003e `\u003coption value=\"${c}\" ${blogCategoryFilter === c ? \"selected\" : \"\"}\u003e${c}\u003c/option\u003e`).join('')}\n            \u003c/select\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n\n        \u003cdiv class=\"table-wrap\"\u003e\n          \u003ctable\u003e\n            \u003cthead\u003e\n              \u003ctr\u003e\n                \u003cth\u003eFeatured Image\u003c/th\u003e\n                \u003cth\u003eBlog Title\u003c/th\u003e\n -card\" style=\"display:flex; flex-direction:column; gap:14px;\"\u003e\n              \u003cdiv style=\"display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;\"\u003e\n                \u003cdiv class=\"glass-card-label\" style=\"margin-bottom:0;\"\u003eSEO Optimization\u003c/div\u003e\n                \u003cspan class=\"badge ${seoScore \u003e 70 ? 'badge-green' : 'badge-red'}\" style=\"font-size:var(--text-xs);\"\u003eScore: ${seoScore}%\u003c/span\u003e\n              \u003c/div\u003e\n\n              \u003cdiv class=\"form-group\"\u003e\n                \u003clabel class=\"form-label\"\u003eFocus Keyword\u003c/label\u003e\n                \u003cinput class=\"form-input\" id=\"eb-keyword\" placeholder=\"reel growth strategy\" value=\"${b.focusKeyword || ''}\"\u003e\n              \u003c/div\u003e\n\n              \u003cdiv class=\"form-group\"\u003e\n                \u003clabel class=\"form-label\"\u003eMeta Title\u003c/label\u003e\n                \u003cinput class=\"form-input\" id=\"eb-meta-title\" placeholder=\"Optional meta title tag override...\" value=\"${b.metaTitle || ''}\"\u003e\n              \u003c/div\u003e\n\n              \u003cdiv class=\"form-group\"\u003e\n                \u003clabel class=\"form-label\"\u003eMeta Description\u003c/label\u003e\n                \u003ctextarea class=\"form-input\" id=\"eb-meta-desc\" rows=\"2\" placeholder=\"Optional meta description override...\" style=\"resize:none;\"\u003e${b.metaDescription || ''}\u003c/textarea\u003e\n              \u003c/div\u003e\n\n              \u003c!-- SEO checklist --\u003e\n              \u003cdiv style=\"margin-top:8px; border-top:1px solid var(--border); padding-top:12px; display:flex; flex-direction:column; gap:6px; font-size:var(--text-xs); color:var(--muted);\"\u003e\n                \u003cdiv style=\"display:flex; align-items:center; gap:8px;\"\u003e\n                  \u003cspan style=\"color:${hasTitle ? 'var(--green)' : 'var(--red)'}\"\u003e${hasTitle ? '✓' : '✗'}\u003c/span\u003e Title length and structure\n                \u003c/div\u003e\n                \u003cdiv style=\"display:flex; align-items:center; gap:8px;\"\u003e\n                  \u003cspan style=\"color:${hasDesc ? 'var(--green)' : 'var(--red)'}\"\u003e${hasDesc ? '✓' : '✗'}\u003c/span\u003e Short description excerpt\n                \u003c/div\u003e\n                \u003cdiv style=\"display:flex; align-items:center; gap:8px;\"\u003e\n                  \u003cspan style=\"color:${hasImg ? 'var(--green)' : 'var(--red)'}\"\u003e${hasImg ? '✓' : '✗'}\u003c/span\u003e Featured Image attached\n                \u003c/div\u003e\n                \u003cdiv style=\"display:flex; align-items:center; gap:8px;\"\u003e\n                  \u003cspan style=\"color:${hasKeyword ? 'var(--green)' : 'var(--red)'}\"\u003e${hasKeyword ? '✓' : '✗'}\u003c/span\u003e Focus keyword config\n                \u003c/div\u003e\n                \u003cdiv style=\"display:flex; align-items:center; gap:8px;\"\u003e\n                  \u003cspan style=\"color:${hasSlug ? 'var(--green)' : 'var(--red)'}\"\u003e${hasSlug ? '✓' : '✗'}\u003c/span\u003e Clean URL slug format\n                \u003c/div\u003e\n                \u003cdiv style=\"display:flex; align-items:center; gap:8px;\"\u003e\n                  \u003cspan style=\"color:${longContent ? 'var(--green)' : 'var(--red)'}\"\u003e${longContent ? '✓' : '✗'}\u003c/span\u003e Content article length\n                \u003c/div\u003e\n              \u003c/div\u003e\n            \u003c/div\u003e\n\n          \u003c/div\u003e\n\n        \u003c/div\u003e\n      `;\n    }\n\n    function renderBlogCategories() {\n      return `\n        \u003cdiv style=\"max-width: 600px; margin: 0 auto; display:flex; flex-direction:column; gap:20px;\"\u003e\n          \u003cdiv class=\"glass-card\"\u003e\n            \u003cdiv class=\"glass-card-label\"\u003eAdd New Category\u003c/div\u003e\n            \u003cdiv style=\"display:flex; gap:12px;\"\u003e\n              \u003cinput class=\"form-input\" id=\"new-cat-input\" placeholder=\"e.g. Video Editing, Sound Design\" style=\"flex-grow:1;\"\u003e\n              \u003cbutton class=\"btn btn-primary\" id=\"add-cat-btn\" style=\"white-space:nowrap; padding:0 20px;\"\u003eCreate Category\u003c/button\u003e\n            \u003c/div\u003e\n          \u003c/div\u003e\n\n          \u003cdiv class=\"glass-card\"\u003e\n            \u003cdiv class=\"glass-card-label\"\u003eTaxonomy Categories\u003c/div\u003e\n            \u003cdiv style=\"display:flex; flex-direction:column; gap:10px;\"\u003e\n              ${blogCategories.map((c, idx) =\u003e `\n                \u003cdiv style=\"display:flex; justify-content:space-between; align-items:center; padding:12px 16px; background:var(--white-03); border-radius:var(--border-radius-3); border:1px solid var(--border);\"\u003e\n                  \u003cdiv style=\"font-weight:var(--fw-semibold); color:var(--white);\"\u003e${c}\u003c/div\u003e\n                  \u003cdiv style=\"display:flex; gap:12px; align-items:center;\"\u003e\n                    \u003cbutton class=\"btn btn-ghost delete-cat-btn\" data-index=\"${idx}\" style=\"color:var(--red); font-size:var(--text-sm); padding:4px 8px;\"\u003eDelete\u003c/button\u003e\n                  \u003c/div\u003e\n                \u003c/div\u003e\n              `).join('')}\n            \u003c/div\u003e\n          \u003c/div\u003e\n        \u003c/div\u003e\n      `;\n    }\n\n    function renderModal() {\n      const isEdit = modal === 'edit';\n      const client = isEdit ? clients.find(c =\u003e c.id === editId) : null;\n      return `\u003cdiv class=\"modal-overlay\" id=\"modal-overlay\"\u003e\u003cdiv class=\"modal\"\u003e\u003cdiv class=\"modal-header\"\u003e\u003cdiv class=\"modal-title\"\u003e${isEdit ? 'Edit Client Details' : 'Add New Client'}\u003c/div\u003e\u003cbutton class=\"modal-close\" id=\"modal-close\" aria-label=\"Close\"\u003e\u003cimg src=\"/assets/icons/close.svg\" alt=\"\" class=\"modal-close-icon\"\u003e\u003c/button\u003e\u003c/div\u003e\u003cdiv class=\"form-row dn\"\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003eClient Image URL\u003c/label\u003e\u003cinput class=\"form-input\" id=\"f-image\" placeholder=\"https://...\" value=\"${client?.image || ''}\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003eClient Name\u003c/label\u003e\u003cinput class=\"form-input\" id=\"f-name\" placeholder=\"Arjun Mehta\" value=\"${client?.name || ''}\"\u003e\u003c/div\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003eBusiness Name\u003c/label\u003e\u003cinput class=\"form-input\" id=\"f-biz\" placeholder=\"Spice Route Café\" value=\"${client?.business || ''}\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003ePhone Number\u003c/label\u003e\u003cinput class=\"form-input\" id=\"f-phone\" placeholder=\"+91 98765 43210\" value=\"${client?.phone || ''}\"\u003e\u003c/div\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003eInstagram Handle\u003c/label\u003e\u003cinput class=\"form-input\" id=\"f-instagram\" placeholder=\"@handle\" value=\"${client?.instagram || ''}\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"form-row\"\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003eReels Count\u003c/label\u003e\u003cinput class=\"form-input\" id=\"f-reels\" type=\"number\" placeholder=\"24\" value=\"${client?.reels || ''}\"\u003e\u003c/div\u003e\u003cdiv class=\"form-group\"\u003e\u003clabel class=\"form-label\"\u003ePrice Per Reel (₹)\u003c/label\u003e\u003cinput class=\"form-input\" id=\"f-ppr\" type=\"number\" placeholder=\"3500\" value=\"${client?.ppr || ''}\"\u003e\u003c/div\u003e\u003c/div\u003e\u003cdiv style=\"background:var(--white-03);border-radius:10px;padding:12px 14px;margin-top:4px\"\u003e\u003cdiv style=\"font-size:11px;color:var(--muted);margin-bottom:4px\"\u003eCalculated Revenue\u003c/div\u003e\u003cdiv id=\"rev-preview\" style=\"font-size:20px;font-weight:700;color:var(--white)\"\u003e₹0\u003c/div\u003e\u003c/div\u003e\u003cdiv class=\"form-footer\"\u003e\u003cbutton class=\"btn btn-ghost\" id=\"modal-cancel\"\u003eCancel\u003c/button\u003e\u003cbutton class=\"btn btn-primary\" id=\"modal-save\"\u003e${isEdit ? 'Save Changes' : 'Add Client'}\u003c/button\u003e\u003c/div\u003e\u003c/div\u003e\u003c/div\u003e`;\n    }\n\n    // ==============================\n    // CHART FUNCTIONS\n    // ==============================\n    function initCharts() {\n      const sorted = [...clients].sort((a, b) =\u003e getRevenue(b) - getRevenue(a));\n      const ctx = document.getElementById('rev-chart');\n      if (!ctx) return;\n      if (window._reelChart) window._reelChart.destroy();\n      window._reelChart = new Chart(ctx, {\n        type: 'bar',\n        data: {\n          labels: sorted.map(c =\u003e c.name.split(' ')[0]),\n          datasets: [{\n            label: 'Revenue (₹)',\n            data: sorted.map(c =\u003e getRevenue(c)),\n            backgroundColor: sorted.map((_, i) =\u003e i === 0 ? 'oklch(0.75 0.10 85 / 0.7)' : 'oklch(52% 0.22 25 / 0.5)'),\n            borderColor: sorted.map((_, i) =\u003e i === 0 ? 'oklch(0.75 0.10 85)' : 'oklch(62.944% 0.25583 25.982)'),\n            borderWidth: 1.5,\n            borderRadius: 6,\n          }]\n        },\n        options: {\n          responsive: true,\n          maintainAspectRatio: false,\n          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx =\u003e '₹' + ctx.raw.toLocaleString('en-IN') } } },\n          scales: {\n            x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 11 } } },\n            y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 11 }, callback: v =\u003e '₹' + v.toLocaleString('en-IN') } }\n          }\n        }\n      });\n    }\n\n    // ==============================\n    // EVENT ATTACHMENT FUNCTIONS\n    // ==============================\n    function attachLogin() {\n      document.getElementById('login-btn')?.addEventListener('click', async () =\u003e {\n        const btn = document.getElementById('login-btn');\n        if (!btn || btn.disabled) return;\n\n        const email = document.getElementById('l-email')?.value?.trim() || \"\";\n        const password = document.getElementById('l-pass')?.value || \"\";\n\n        const origHtml = btn.innerHTML;\n        btn.disabled = true;\n        btn.innerHTML = `\u003cspan class=\"btn-loader\"\u003e\u003c/span\u003e Signing In...`;\n\n        const success = await login(email, password);\n        if (success) {\n          const user = getCurrentUser();\n          const role = user?.role?.toLowerCase();\n          if (role === \"sales\") {\n            page = \"sales\";\n          } else if (role === \"blogger\") {\n            page = \"blogs\";\n          } else {\n            page = \"dashboard\";\n          }\n          render();\n          startActivityTracking();\n          if (role === \"admin\") {\n            loadGoogleSheetData();\n            loadUsers();\n            loadSales();\n            loadBlogs();\n          } else if (role === \"sales\") {\n            loadSales();\n          } else if (role === \"blogger\") {\n            loadBlogs();\n          }\n        } else {\n          btn.disabled = false;\n          btn.innerHTML = origHtml;\n          document.getElementById('login-err').style.display = 'block';\n        }\n      });\n      document.getElementById('l-pass')?.addEventListener('keydown', ev =\u003e {\n        if (ev.key === 'Enter') {\n          document.getElementById('login-btn')?.click();\n        }\n      });\n    }\n\n    function attachSessionExpiredEvents() {\n\n      document\n        .getElementById(\"session-login-btn\")\n        ?.addEventListener(\"click\", () =\u003e {\n\n          sessionExpired = false;\n\n          const email =\n            document.getElementById(\"l-email\");\n\n          if (email) {\n            email.focus();\n          }\n\n          render();\n        });\n    }\n\n    function attachModalEvents() {\n      const updatePreview = () =\u003e {\n        const r = parseInt(document.getElementById('f-reels')?.value) || 0;\n        const p = parseInt(document.getElementById('f-ppr')?.value) || 0;\n        const el = document.getElementById('rev-preview');\n        if (el) el.textContent = '₹' + (r * p).toLocaleString('en-IN');\n      };\n      document.getElementById('f-reels')?.addEventListener('input', updatePreview);\n      document.getElementById('f-ppr')?.addEventListener('input', updatePreview);\n      updatePreview();\n      document.getElementById('modal-close')?.addEventListener('click', () =\u003e { modal = null; render(); });\n      document.getElementById('modal-cancel')?.addEventListener('click', () =\u003e { modal = null; render(); });\n      document.getElementById('modal-overlay')?.addEventListener('click', e =\u003e { if (e.target.id === 'modal-overlay') { modal = null; render(); } });\n      document.getElementById('modal-save')?.addEventListener('click', () =\u003e {\n        const data = {\n          name: document.getElementById('f-name')?.value?.trim() || \"\",\n          business: document.getElementById('f-biz')?.value?.trim() || \"\",\n          phone: document.getElementById('f-phone')?.value?.trim() || \"\",\n          instagram: document.getElementById('f-instagram')?.value?.trim() || \"\",\n          reels: document.getElementById('f-reels')?.value || \"\",\n          ppr: document.getElementById('f-ppr')?.value || \"\",\n          image: document.getElementById('f-image')?.value?.trim() || \"\"\n        };\n        if (!data.name || !data.business) {\n          showToast('Name and business are required', 'error');\n          return;\n        }\n        if (modal === 'edit') updateClient(editId, data);\n        else addClient(data);\n        modal = null;\n        render();\n      });\n    }\n\n    function attachEvents() {\n      // Sidebar expand/collapse toggle\n      document.getElementById('sidebar-toggle')?.addEventListener('click', () =\u003e {\n        sidebarCollapsed = !sidebarCollapsed;\n        render();\n      });\n\n      // Nav group expand/collapse\n      document.querySelectorAll('.nav-group-toggle').forEach(btn =\u003e {\n        btn.addEventListener('click', () =\u003e {\n          if (sidebarCollapsed) {\n            // If sidebar is collapsed, expand it first, then expand the group\n            sidebarCollapsed = false;\n            expandedGroups[btn.dataset.group] = true;\n          } else {\n            expandedGroups[btn.dataset.group] = !expandedGroups[btn.dataset.group];\n          }\n          render();\n        });\n      });\n\n      document.querySelectorAll('[data-page]').forEach(b =\u003e b.addEventListener('click', () =\u003e {\n        const user = getCurrentUser();\n        const role = user?.role?.toLowerCase();\n        if (role === \"sales\" \u0026\u0026 b.dataset.page !== \"sales\") {\n          return;\n        }\n        if (role === \"blogger\" \u0026\u0026 b.dataset.page !== \"blogs\" \u0026\u0026 b.dataset.page !== \"create-blog\" \u0026\u0026 b.dataset.page !== \"blog-categories\") {\n          return;\n        }\n        page = b.dataset.page;\n\n        localStorage.setItem(\n          \"reelscale_current_page\",\n          page\n        );\n\n        mobileMenuOpen = false;\n        search = '';\n        render();\n      }));\n      document\n        .getElementById(\"theme-toggle\")\n        ?.addEventListener(\"click\", toggleTheme);\n      document.querySelectorAll(\".toggle-password\")\n        .forEach(btn =\u003e {\n\n          btn.addEventListener(\"click\", () =\u003e {\n\n            const input =\n              document.getElementById(\n                btn.dataset.target\n              );\n\n            if (!input) return;\n\n            input.type =\n              input.type === \"password\"\n                ? \"text\"\n                : \"password\";\n\n            btn.src =\n              input.type === \"password\"\n                ? \"/assets/icons/eye.svg\"\n                : \"/assets/icons/eye-off.svg\";\n          });\n\n        });\n\n      document.querySelector(\".create-user-btn\")\n        ?.addEventListener(\"click\", async () =\u003e {\n\n          const name =\n            document.getElementById(\"new-user-name\")\n              ?.value?.trim() || \"\";\n\n          const email =\n            document.getElementById(\"new-user-email\")\n              ?.value?.trim() || \"\";\n\n          const password =\n            document.getElementById(\"new-user-password\")\n              ?.value?.trim() || \"\";\n\n          const role =\n            document.getElementById(\"new-user-role\")\n              ?.value;\n\n          if (!name || !email || !password) {\n\n            showToast(\n              \"All fields are required\",\n              \"error\"\n            );\n\n            return;\n          }\n\n          await addUser({\n            name,\n            email,\n            password,\n            role\n          });\n\n          newUserRow = false;\n\n          render();\n        });\n\n      document.querySelector(\".cancel-user-btn\")\n        ?.addEventListener(\"click\", () =\u003e {\n\n          newUserRow = false;\n          render();\n\n        });\n\n      document.querySelectorAll(\".user-name-input\")\n        .forEach(input =\u003e {\n\n          input.addEventListener(\"blur\", async () =\u003e {\n\n            const user =\n              users.find(\n                x =\u003e String(x.id) === input.dataset.id\n              );\n\n            if (!user) return;\n\n            if (user.name === input.value) return;\n\n            await updateUser(user.id, {\n              ...user,\n              name: input.value\n            });\n\n          });\n\n        });\n      document.querySelectorAll(\".user-email-input\")\n        .forEach(input =\u003e {\n\n          input.addEventListener(\"blur\", async () =\u003e {\n\n            const user =\n              users.find(\n                x =\u003e String(x.id) === input.dataset.id\n              );\n\n            if (!user) return;\n\n            if (user.email === input.value) return;\n\n            await updateUser(user.id, {\n              ...user,\n              email: input.value\n            });\n\n          });\n\n        });\n\n      document.querySelectorAll(\".user-password-input\")\n        .forEach(input =\u003e {\n\n          input.addEventListener(\"blur\", async () =\u003e {\n\n            const user =\n              users.find(\n                x =\u003e String(x.id) === input.dataset.id\n              );\n\n            if (!user) return;\n\n            if (user.password === input.value) return;\n\n            await updateUser(user.id, {\n              ...user,\n              password: input.value\n            });\n\n          });\n\n        });\n\n      document.querySelectorAll(\".user-role-input\")\n        .forEach(select =\u003e {\n\n          select.addEventListener(\"change\", async () =\u003e {\n\n            const user =\n              users.find(\n                x =\u003e String(x.id) === select.dataset.id\n              );\n\n            if (!user) return;\n\n            await updateUser(user.id, {\n              ...user,\n              role: select.value\n            });\n\n          });\n\n        });\n\n      document.querySelectorAll(\".delete-user\")\n        .forEach(btn =\u003e {\n\n          btn.addEventListener(\"click\", async () =\u003e {\n\n            await deleteUser(btn.dataset.id);\n\n          });\n\n        });\n\n      document.querySelectorAll(\".call-sale\").forEa
