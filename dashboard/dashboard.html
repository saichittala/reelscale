    // Google Apps Script endpoints — direct calls, work from any host
    const GAS_USERS_URL = "https://script.google.com/macros/s/AKfycbx4ZaU3l-XsieGxzfGg26XRSFb5TmxL3anOxrLHmpXcufsk3O8zMGWZkj-u0VWdPULG/exec";
    const GAS_CLIENTS_URL = "https://script.google.com/macros/s/AKfycbylr9KMErADMLGAmqoUZa9lIzhoIwOqw3mAWfPPGUpRQjIimzAqnzfGJYGX8LLKsSoC/exec";
    const GAS_SALES_URL = "https://script.google.com/macros/s/AKfycbyofRzBP8UpOX5Nt-l8C6Mj5rw5dHQH8YAt5sBPiltzyfndAiEKZh_4xyVhsV11lBb0/exec";

    const useLocalAPI = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";

    // Custom fetch wrapper to support local Next.js APIs during development with RBAC headers
    async function customFetch(url, options = {}) {
      let targetUrl = url;
      const updatedOptions = { ...options };

      if (useLocalAPI) {
        if (url === GAS_USERS_URL) {
          if (options.body) {
            try {
              const bodyObj = JSON.parse(options.body);
              if (bodyObj.action === "login") {
                targetUrl = "/api/auth";
                updatedOptions.body = JSON.stringify({ email: bodyObj.email, password: bodyObj.password });
              } else {
                targetUrl = "/api/users";
              }
            } catch (e) {
              targetUrl = "/api/users";
            }
          } else {
            targetUrl = "/api/users";
          }
        } else if (url === GAS_CLIENTS_URL) {
          targetUrl = "/api/clients";
        } else if (url === GAS_SALES_URL) {
          targetUrl = "/api/sales";
        } else if (GAS_BLOGS_URL && url === GAS_BLOGS_URL) {
          targetUrl = "/api/blogs";
        }
      }

      const user = getCurrentUser();

      if (useLocalAPI) {
        const headers = {
          "Content-Type": "application/json",
          ...(options.headers || {})
        };
        if (user) {
          headers["x-user-role"] = user.role;
          headers["x-user-email"] = user.email;
        }
        updatedOptions.headers = headers;
      } else {
        if (options.body) {
          updatedOptions.headers = {
            "Content-Type": "text/plain"
          };
        } else {
          if (updatedOptions.headers) {
            delete updatedOptions.headers;
          }
        }
      }

      return fetch(targetUrl, updatedOptions);
    }

    function resetLogoutTimer() {
      if (!isLoggedIn()) return;
      clearTimeout(logoutTimer);
      logoutTimer = setTimeout(() => {
        clearTimeout(logoutTimer);

        sessionExpired = true;

        localStorage.removeItem("reelscale_auth");
        localStorage.removeItem("reelscale_user");
        localStorage.removeItem(
          "reelscale_current_page"
        );

        modal = null;
        editId = null;
        page = "dashboard";

        render();
      }, AUTO_LOGOUT_TIME);
    }

    function startActivityTracking() {
      ['click', 'mousemove', 'keydown', 'scroll', 'touchstart'].forEach(event => {
        document.addEventListener(event, resetLogoutTimer);
      });
      resetLogoutTimer();
    }

    function isLoggedIn() {
      return localStorage.getItem(AUTH_KEY) === '1';
    }

    function setAuth(v) {
      v ? localStorage.setItem(AUTH_KEY, '1') : localStorage.removeItem(AUTH_KEY);
    }

    function getCurrentUser() {
      return JSON.parse(localStorage.getItem("reelscale_user") || "null");
    }

    async function login(email, password) {
      try {
        const response = await customFetch(GAS_USERS_URL, {
          method: "POST",

          body: JSON.stringify({ action: "login", email, password }),
        });
        const data = await response.json();
        if (!data.success) {
          return false;
        }
        setAuth(true);
        localStorage.setItem("reelscale_user", JSON.stringify(data.user));
        return true;
      } catch (error) {
        console.error("Login error:", error);
        return false;
      }
    }

    function showToast(msg, type = 'success') {
      if (toastTimer) clearTimeout(toastTimer);
      toast = { msg, type };
      render();
      toastTimer = setTimeout(() => {
        toast = null;
        render();
      }, 2800);
    }

    function getRevenue(c) {
      return (c.reels || 0) * (c.ppr || 0);
    }

    function filteredClients() {
      let c = [...clients];
      if (search) {
        c = c.filter(x => (x.name + x.business + x.instagram).toLowerCase().includes(search.toLowerCase()));
      }
      c.sort((a, b) => {
        let av = sortKey === 'revenue' ? getRevenue(a) : sortKey === 'reels' ? a.reels : 0;
        let bv = sortKey === 'revenue' ? getRevenue(b) : sortKey === 'reels' ? b.reels : 0;
        return (av - bv) * sortDir;
      });
      return c;
    }

    function stats() {
      const total = clients.length;
      const reels = clients.reduce((s, c) => s + (c.reels || 0), 0);
      const rev = clients.reduce((s, c) => s + getRevenue(c), 0);
      const top = [...clients].sort((a, b) => getRevenue(b) - getRevenue(a))[0] || null;
      return { total, reels, rev, top };
    }

    function fmt(n) {
      return n >= 100000 ? (n / 100000).toFixed(1) + 'L' : n >= 1000 ? (n / 1000).toFixed(1) + 'K' : n;
    }

    function fmtFull(n) {
      return '₹' + n.toLocaleString('en-IN');
    }

    function toDateStr(d) {
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      return `${y}-${m}-${day}`;
    }

    function formatDisplayDate(str) {
      if (!str) return '';
      const parts = str.split('-');
      if (parts.length !== 3) return str;
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      return `${months[parseInt(parts[1]) - 1] || parts[1]} ${parseInt(parts[2])}, ${parts[0]}`;
    }

    async function loadGoogleSheetData(ignoreCache = false) {
      if (!ignoreCache) {
        const cached = localStorage.getItem("clients_cache");
        if (cached) {
          try {
            const data = JSON.parse(cached);
            if (Array.isArray(data)) {
              clients = data.map(row => ({
                id: row.id,
                name: row.clientName,
                business: row.business,
                phone: row.phone,
                instagram: row.instagram,
                reels: row.reels,
                ppr: row.pricePerReel,
                image: row.image
              }));
              clientsLoaded = true;
              render();
            }
          } catch (e) {
            console.error("Failed to parse clients cache", e);
          }
        }
      }

      try {
        if (!clientsLoaded) {
          clientsLoaded = false;
          render();
        }
        const response = await customFetch(GAS_CLIENTS_URL);
        const data = await response.json();
        if (Array.isArray(data)) {
          localStorage.setItem(
            "clients_cache",
            JSON.stringify(data)
          );
          clients = data.map(row => ({
            id: row.id,
            name: row.clientName,
            business: row.business,
            phone: row.phone,
            instagram: row.instagram,
            reels: row.reels,
            ppr: row.pricePerReel,
            image: row.image
          }));
        } else {
          clients = [];
        }
        clientsLoaded = true;
        render();
      } catch (error) {
        clientsLoaded = true;
        render();
        console.error("Clients Load Error:", error);
      }
    }

    async function loadBlogs() {
      try {
        let blogsData = [];
        try {
          let urlToFetch = GAS_BLOGS_URL;
          if (!urlToFetch && useLocalAPI) {
            urlToFetch = "/api/blogs";
          }
          if (!urlToFetch) {
            throw new Error("No blogs database URL configured.");
          }
          const response = await customFetch(urlToFetch);
          if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
          
          const text = await response.text();
          if (!text || !text.trim()) {
            throw new Error("Empty response received from blogs database.");
          }
          blogsData = JSON.parse(text);
        } catch (error) {
          console.warn("Dynamic API fetch/parse failed, trying static fallback:", error);
          const response = await fetch("/blogs.json");
          if (!response.ok) throw new Error(`Fallback HTTP error! status: ${response.status}`);
          
          const text = await response.text();
          if (!text || !text.trim()) {
            throw new Error("Fallback blogs.json content is empty.");
          }
          blogsData = JSON.parse(text);
        }
        blogs = Array.isArray(blogsData) ? blogsData : [];
        blogsLoaded = true;

        // Extract unique categories from blogs to keep categories updated
        const cats = Array.from(new Set(blogs.map(b => b.category).filter(Boolean)));
        cats.forEach(c => {
          if (!blogCategories.includes(c)) blogCategories.push(c);
        });

        render();
      } catch (error) {
        console.error("Blogs Load Error:", error);
        blogsLoaded = true;
        render();
      }
    }

    async function saveBlogToServer(blogData) {
      try {
        const action = blogData.id ? "update" : "add";
        const response = await customFetch(GAS_BLOGS_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action,
            ...blogData
          })
        });
        const result = await response.json();
        if (!result.success) {
          throw new Error(result.message || "Save failed");
        }
        showToast(blogData.id ? "Blog updated successfully" : "Blog created successfully");
        editingBlog = null;
        page = "blogs";
        await loadBlogs();
      } catch (error) {
        console.error(error);
        showToast(error.message || "Failed to save blog", "error");
      }
    }

        showToast(error.message || "Failed to add lead", "error");

    async function handleSalesImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        const workbook = XLSX.read(e.target.result, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);
        if (!rows.length) {
          showToast("No records found", "error");
          return;
        }
        showToast(`Importing ${rows.length} leads...`);
        for (const row of rows) {
          await addSale({
            category: row.Category || "",
            companyName: row.CompanyName || row.Company || "",
            contactPerson: row.ContactPerson || "",
            phoneNumber: row.PhoneNumber || row.Phone || "",
            notes: row.Notes || "",
            contacted: row.Contacted || "No"
          });
        }
        showToast(`${rows.length} leads imported successfully`);
      };
      reader.readAsArrayBuffer(file);
    }

    // ==============================
    // RENDER FUNCTIONS
    // ==============================
    function render() {
      const currentUser = getCurrentUser();

      const role = currentUser?.role?.toLowerCase();

      if (
        role === "sales" &&
        page !== "sales"
      ) {
        page = "sales";
      } else if (
        role === "blogger" &&
        page !== "blogs" &&
        page !== "create-blog" &&
        page !== "blog-categories"
      ) {

      return `<div class="controls"><div class="search-wrap"><img src="../assets/icons/search.svg" alt="Search" style="width:16px;position:absolute;left:12px;top:50%;transform:translateY(-50%)"><input id="search-input" placeholder="Search clients..." value="${search}" class="form-input" style="padding-left:36px"></div><button class="filter-btn${sortKey === 'revenue' ? ' active' : ''}" data-sort="revenue">↓ Revenue</button><button class="filter-btn${sortKey === 'reels' ? ' active' : ''}" data-sort="reels">↓ Reels</button></div><div class="table-wrap"><table><thead><tr><th>Client Name</th><th>Business</th><th>Insta ID</th><th>Reels</th><th>Price/Reel</th><th>Revenue</th><th>Revenue Share</th><th style="width:120px">Actions</th></tr></thead><tbody>${fc.length === 0 ? `<tr><td colspan="8"><div class="empty"><div class="empty-icon">◎</div><div class="empty-text">No clients found</div></div></td></tr>` : ''}${fc.map(c => { const rev = getRevenue(c); const pct = Math.round(rev / maxRev * 100); return `<tr><td><div style="display:flex;align-items:center;gap:10px;"><div class="client-avatar">${c.image ? `<img src="${c.image}" alt="${c.name}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : c.name[0]}</div><div><div style="font-weight:500">${c.name}</div><div style="font-size:11px;color:var(--muted)">${c.phone || '—'}</div></div></div></td><td>${c.business}</td><td style="color:var(--muted)">${c.instagram || '—'}</td><td><span class="badge badge-red">${c.reels}</span></td><td>₹${(c.ppr || 0).toLocaleString()}</td><td style="font-weight:600;color:var(--white)">₹${rev.toLocaleString()}</td><td style="min-width:100px"><div class="rev-bar"><div class="rev-bar-fill" style="width:${pct}%"></div></div></td><td style="width:120px"><div class="action-btns"><img src="../assets/icons/edit.svg" alt="Edit" class="edit-client" data-id="${c.id}" title="Edit Client"><img src="../assets/icons/delete.svg" alt="Delete" class="del-client" data-id="${c.id}" title="Delete Client"></div></td></tr>`; }).join('')}</tbody></table></div>`;

    function renderAnalytics() {

    function renderSales() {
      if (!salesLoaded) {
        return renderSkeleton('sales');
      }
      function normalizeDate(str) {
        if (!str) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(str)) return str;
        const d = new Date(str);
        if (isNaN(d.getTime())) return str;
        return toDateStr(d);
      }
      const filteredSales = sales.filter(item => {
        const cd = normalizeDate(item.createdDate);
        if (!cd) return true;
        if (salesDateFrom && cd < salesDateFrom) {
          return false;
        }
        if (salesDateTo && cd > salesDateTo) {
          return false;
        }
        return true;
      });
      return `<div class="sales-date-filter-panel" style="${salesFilterExpanded ? 'display:flex;' : 'display:none;'} margin-bottom: 16px;">
          <div class="sales-date-filter" style="margin-top:0;margin-bottom:0;width:100%;">

              <label class="date-filter-label">From</label>
              <input type="date" id="sales-date-from" class="date-filter-input" value="${salesDateFrom}">
            </div>
            <div class="date-filter-group">
              <label class="date-filter-label">To</label>
              <input type="date" id="sales-date-to" class="date-filter-input" value="${salesDateTo}">

tDisplayDate(item.createdDate)}</td><td><input type="checkbox" class="contacted-toggle" data-id="${item.id}" ${item.contacted === "Yes" ? "checked" : ""}></td><td style="width:120px"><div class="action-btns"><a href="tel:${item.phoneNumber}" class="call-sale" data-id="${item.id}" title="Call"><img src="../assets/icons/phone.svg" alt="Call" width="18" height="18"></a><a href="${createWhatsAppLink(item.phoneNumber)}" class="whatsapp-sale" target="_blank" title="WhatsApp"><img src="../assets/icons/whatsapp.svg" width="18" height="18"></a><img src="../assets/icons/edit.svg" class="edit-sale edit-btn-td dn" data-id="${item.id}"><img src="../assets/icons/delete.svg" class="delete-sale delete-btn-td" data-id="${item.id}"></div></td></tr>`).join("")}</tbody></table></div>`;

    function initCharts() {
      const sorted = [...clients].sort((a, b) => getRevenue(b) - getRevenue(a));
      const ctx = document.getElementById('rev-chart');
      if (!ctx) return;
      if (window._reelChart) window._reelChart.destroy();
      window._reelChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: sorted.map(c => c.name.split(' ')[0]),
          datasets: [{
            label: 'Revenue (₹)',
            data: sorted.map(c => getRevenue(c)),
            backgroundColor: sorted.map((_, i) => i === 0 ? 'oklch(0.75 0.10 85 / 0.7)' : 'oklch(52% 0.22 25 / 0.5)'),
            borderColor: sorted.map((_, i) => i === 0 ? 'oklch(0.75 0.10 85)' : 'oklch(62.944% 0.25583 25.982)'),
            borderWidth: 1.5,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => '₹' + ctx.raw.toLocaleString('en-IN') } } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 11 } } },
            y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 11 }, callback: v => '₹' + v.toLocaleString('en-IN') } }
          }
        }
      });
    }

    function attachLogin() {
      document.getElementById('login-btn')?.addEventListener('click', async () => {
        const btn = document.getElementById('login-btn');
        if (!btn || btn.disabled) return;

        const email = document.getElementById('l-email')?.value?.trim() || "";
        const password = document.getElementById('l-pass')?.value || "";

        const origHtml = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = `<span class="btn-loader"></span> Signing In...`;

        const success = await login(email, password);
        if (success) {
          const user = getCurrentUser();
          const role = user?.role?.toLowerCase();
          if (role === "sales") {
            page = "sales";
          } else if (role === "blogger") {
            page = "blogs";
          } else {
            page = "dashboard";
          }
          render();
          startActivityTracking();
          if (role === "admin") {
            loadGoogleSheetData();
            loadUsers();
            loadSales();
            loadBlogs();
          } else if (role === "sales") {
            loadSales();
          } else if (role === "blogger") {
            loadBlogs();
          }
        } else {
          btn.disabled = false;
          btn.innerHTML = origHtml;
          document.getElementById('login-err').style.display = 'block';
        }
      });
      document.getElementById('l-pass')?.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') {

        }
      });

        const replacement = openTag + selected + closeTag;
        textarea.value = text.substring(0, start) + replacement + text.substring(end);

        textarea.setSelectionRange(start + openTag.length, start + openTag.length + selected.length);

          const q = row.querySelector('.faq-q-input').value;
          const a = row.querySelector('.faq-a-input').value;
          activeFAQ.push({ question: q, answer: a });
        });

        activeFAQ.push({ question: "", answer: "" });

        if (!editingBlog) {
          editingBlog = {
            title: document.getElementById('eb-title').value,
            slug: document.getElementById('eb-slug').value,
            description: document.getElementById('eb-desc').value,
            category: document.getElementById('eb-category').value,
            content: document.getElementById('eb-content').value,
            status: document.getElementById('eb-status').value,
            publishedDate: document.getElementById('eb-pubdate').value,
            featuredImage: document.getElementById('eb-img-url').value,
            focusKeyword: document.getElementById('eb-keyword').value,
            metaTitle: document.getElementById('eb-meta-title').value,
            metaDescription: document.getElementById('eb-meta-desc').value,
          };
        }
        editingBlog.faq = activeFAQ;
        render();
      });

      // FAQ builders: Delete item
      document.querySelectorAll('.eb-faq-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.index);
          const activeFAQ = [];
          document.querySelectorAll('.faq-edit-row').forEach(row => {
            const index = parseInt(row.dataset.index);
            if (index !== idx) {
              const q = row.querySelector('.faq-q-input').value;
              const a = row.querySelector('.faq-a-input').value;
              activeFAQ.push({ question: q, answer: a });
            }
          });

          if (!editingBlog) {
            editingBlog = {
              title: document.getElementById('eb-title').value,
              slug: document.getElementById('eb-slug').value,
              description: document.getElementById('eb-desc').value,
              category: document.getElementById('eb-category').value,
              content: document.getElementById('eb-content').value,
              status: document.getElementById('eb-status').value,
              publishedDate: document.getElementById('eb-pubdate').value,
              featuredImage: document.getElementById('eb-img-url').value,
              focusKeyword: document.getElementById('eb-keyword').value,
              metaTitle: document.getElementById('eb-meta-title').value,
              metaDescription: document.getElementById('eb-meta-desc').value,
            };
          }
          editingBlog.faq = activeFAQ;
          render();
        });
      });

      // Save / Publish Action
      document.getElementById('save-blog-btn')?.addEventListener('click', () => {
        const title = document.getElementById('eb-title').value.trim();
        const slug = document.getElementById('eb-slug').value.trim();
        const description = document.getElementById('eb-desc').value.trim();
        const category = document.getElementById('eb-category').value;
        const content = document.getElementById('eb-content').value;
        const status = document.getElementById('eb-status').value;
        const publishedDate = document.getElementById('eb-pubdate').value;
        const featuredImage = document.getElementById('eb-img-url').value.trim();
        const focusKeyword = document.getElementById('eb-keyword').value.trim();
        const metaTitle = document.getElementById('eb-meta-title').value.trim();
        const metaDescription = document.getElementById('eb-meta-desc').value.trim();

        // Collect FAQ items
        const faq = [];
        document.querySelectorAll('.faq-edit-row').forEach(row => {
          const q = row.querySelector('.faq-q-input').value.trim();
          const a = row.querySelector('.faq-a-input').value.trim();
          if (q && a) faq.push({ question: q, answer: a });
        });

        if (!title || !slug) {
          showToast("Article Title and Slug are required", "error");
          return;
        }

        saveBlogToServer({
          id: editingBlog?.id,
          title,
          slug,
          description,
          category,
          content,
          status,
          publishedDate,
          featuredImage,
          focusKeyword,
          metaTitle,
          metaDescription,
          faq
        });
      });

      // Category Add
      document.getElementById('add-cat-btn')?.addEventListener('click', () => {
        const val = document.getElementById('new-cat-input').value.trim();
        if (!val) {
          showToast("Category name is required", "error");
          return;
        }
        if (blogCategories.includes(val)) {
          showToast("Category already exists", "error");
          return;
        }
        blogCategories.push(val);
        showToast("Category created successfully");
        render();
      });

      // Category Delete
      document.querySelectorAll('.delete-cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const idx = parseInt(btn.dataset.index);
          const name = blogCategories[idx];
          if (confirm(`Are you sure you want to delete category "${name}"?`)) {
            blogCategories.splice(idx, 1);
            showToast("Category deleted successfully");
            render();
          }
        });
      });

      if (modal || newUserRow || newLeadRow) attachModalEvents();
    }

    // ==============================
    // INITIALIZATION
    // ==============================

    async function init() {
      if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light-theme");
      }

      const user = getCurrentUser();
      const role = user?.role?.toLowerCase();

      const savedPage =
        localStorage.getItem(
          "reelscale_current_page"
        );

      if (role === "sales") {
        page = "sales";
      } else if (role === "blogger") {
        page = "blogs";
      } else {
        page = savedPage || "dashboard";
      }
      const savedTheme =
        localStorage.getItem("theme") || "dark";

      document.documentElement.setAttribute(
        "data-theme",
        savedTheme
      );
      render();

      if (!isLoggedIn()) {
        return;
      }

      if (role === "admin") {
        loadGoogleSheetData();
        loadUsers();
        loadSales();
        loadBlogs();
      } else if (role === "sales") {
        loadSales();
      } else if (role === "blogger") {
        loadBlogs();
      }
    }

    init();

    if (isLoggedIn()) {
      startActivityTracking();
    }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/services/users.js"></script>
  <script src="js/services/clients.js"></script>
  <script src="js/services/sales.js"></script>
  <script>
    if (!isLoggedIn() && window.location.pathname !== "/dashboard/login") {
      window.location.href = "login.html";
    }
  </script>
</body>

</html>
