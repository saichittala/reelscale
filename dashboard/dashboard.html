<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="../styles.css">
  <link rel="stylesheet" href="dashboard.css">
  <link rel="icon" href="../assets/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="../assets/favicon.png">
  <link rel="apple-touch-icon" href="../assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body>
  <div id="root"></div>
  <script>
    // ==============================
    // CONSTANTS & CONFIGURATION
    // ==============================
    const AUTH_KEY = 'reelscale_auth';
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbylr9KMErADMLGAmqoUZa9lIzhoIwOqw3mAWfPPGUpRQjIimzAqnzfGJYGX8LLKsSoC/exec";
    const CRED = { email: 'admin@reelscale.com', password: 'surya@123' };
    const AUTO_LOGOUT_TIME = 8 * 60 * 1000;
    const USERS_URL = "https://script.google.com/macros/s/AKfycbx4ZaU3l-XsieGxzfGg26XRSFb5TmxL3anOxrLHmpXcufsk3O8zMGWZkj-u0VWdPULG/exec";
    const SALES_URL = "https://script.google.com/macros/s/AKfycbyofRzBP8UpOX5Nt-l8C6Mj5rw5dHQH8YAt5sBPiltzyfndAiEKZh_4xyVhsV11lBb0/exec";

    let logoutTimer = null;
    let clients = [];
    let users = [];
    let sales = [];
    let newLeadRow = false;
    let mobileMenuOpen = false;
    let page = "dashboard";
    let modal = null;
    let editId = null;
    let search = '';
    let sortKey = 'revenue';
    let sortDir = -1;
    let toast = null;
    let toastTimer = null;
    let dataLoaded = false;
    let sessionExpired = false;
    let newUserRow = false;
    let usersLoaded = false;
    let clientsLoaded = false;
    let salesLoaded = false;


    // ==============================
    // UTILITY FUNCTIONS
    // ==============================
    function resetLogoutTimer() {
      if (!isLoggedIn()) return;
      clearTimeout(logoutTimer);
      logoutTimer = setTimeout(() => {
        clearTimeout(logoutTimer);

        sessionExpired = true;

        localStorage.removeItem("reelscale_auth");
        localStorage.removeItem("reelscale_user");
        localStorage.removeItem(
          "reelscale_current_page"
        );

        modal = null;
        editId = null;
        page = "dashboard";

        render();
      }, AUTO_LOGOUT_TIME);
    }

    function startActivityTracking() {
      ['click', 'mousemove', 'keydown', 'scroll', 'touchstart'].forEach(event => {
        document.addEventListener(event, resetLogoutTimer);
      });
      resetLogoutTimer();
    }

    function isLoggedIn() {
      return localStorage.getItem(AUTH_KEY) === '1';
    }

    function setAuth(v) {
      v ? localStorage.setItem(AUTH_KEY, '1') : localStorage.removeItem(AUTH_KEY);
    }

    function getCurrentUser() {
      return JSON.parse(localStorage.getItem("reelscale_user") || "null");
    }

    function login(email, password) {
      if (email === CRED.email && password === CRED.password) {
        setAuth(true);
        localStorage.setItem("reelscale_user", JSON.stringify({ name: "Admin", email: email, role: "admin" }));
        return true;
      }
      const user = users.find(u => u.email === email && u.password === password);
      if (user) {
        setAuth(true);
        localStorage.setItem("reelscale_user", JSON.stringify({ name: user.name, email: user.email, role: user.role }));
        return true;
      }
      return false;
    }

    function showToast(msg, type = 'success') {
      if (toastTimer) clearTimeout(toastTimer);
      toast = { msg, type };
      render();
      toastTimer = setTimeout(() => {
        toast = null;
        render();
      }, 2800);
    }

    function getRevenue(c) {
      return (c.reels || 0) * (c.ppr || 0);
    }

    function filteredClients() {
      let c = [...clients];
      if (search) {
        c = c.filter(x => (x.name + x.business + x.instagram).toLowerCase().includes(search.toLowerCase()));
      }
      c.sort((a, b) => {
        let av = sortKey === 'revenue' ? getRevenue(a) : sortKey === 'reels' ? a.reels : 0;
        let bv = sortKey === 'revenue' ? getRevenue(b) : sortKey === 'reels' ? b.reels : 0;
        return (av - bv) * sortDir;
      });
      return c;
    }

    function stats() {
      const total = clients.length;
      const reels = clients.reduce((s, c) => s + (c.reels || 0), 0);
      const rev = clients.reduce((s, c) => s + getRevenue(c), 0);
      const top = [...clients].sort((a, b) => getRevenue(b) - getRevenue(a))[0] || null;
      return { total, reels, rev, top };
    }

    function fmt(n) {
      return n >= 100000 ? (n / 100000).toFixed(1) + 'L' : n >= 1000 ? (n / 1000).toFixed(1) + 'K' : n;
    }

    function fmtFull(n) {
      return '₹' + n.toLocaleString('en-IN');
    }

    let nextId = () => Date.now();

    function createWhatsAppLink(phone) {
      const message = `Hey 👋\n\nWe came across your brand and instantly saw huge potential 🚀\n\nHonestly, with the right content and visual presentation, your brand could stand out on a whole new level 📈\n\nWe're ReelScale — a premium cinematic reel brand creating high-performing content that makes brands look more premium, more trusted, and more impactful ✨\n\nFeel like we could really elevate your brand's online presence 🔥\n\nWe'd genuinely love to collaborate and create something visually powerful together.\n\n— Team ReelScale`;
      const cleanPhone = String(phone || "").replace(/\D/g, "");
      return `https://wa.me/91${cleanPhone}?text=${encodeURIComponent(message)}`;
    }

    // ==============================
    // API FUNCTIONS
    // ==============================
    async function loadGoogleSheetData() {
      try {
        clientsLoaded = false;
        render();
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        localStorage.setItem(
          "clients_cache",
          JSON.stringify(data)
        );
        clients = data.map(row => ({
          id: row.id,
          name: row.clientName,
          business: row.business,
          phone: row.phone,
          instagram: row.instagram,
          reels: row.reels,
          ppr: row.pricePerReel,
          image: row.image
        }));
        clientsLoaded = true;
        render();
      } catch (error) {

        clientsLoaded = true;
        render();
        console.error(error);
      }
    }

    async function loadUsers() {
      try {

        usersLoaded = false;
        render();

        const response = await fetch(USERS_URL);

        const data = await response.json();

        console.log("Users:", data);

        if (data.success) {
          users = data.users || [];
        } else {
          users = [];
        }

        usersLoaded = true;
        render();

      } catch (error) {

        console.error(
          "Users Load Error:",
          error
        );

        users = [];
        usersLoaded = true;
        render();
      }
    }

    async function addUser(data) {

      try {

        const response = await fetch(USERS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "add",
            name: data.name,
            email: data.email,
            password: data.password,
            role: data.role
          })
        });

        const result = await response.json();

        console.log("ADD USER:", result);

        if (!result.success) {
          throw new Error(result.message || "Add failed");
        }

        await loadUsers();

        showToast("User added successfully");

      } catch (error) {

        console.error(error);

        showToast(
          error.message || "Failed to add user",
          "error"
        );
      }
    }
    async function updateUser(id, data) {

      const index =
        users.findIndex(
          x => String(x.id) === String(id)
        );

      if (index === -1) return;

      const oldData = { ...users[index] };

      users[index] = {
        ...users[index],
        ...data
      };

      render();

      try {

        const response = await fetch(USERS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "update",
            id: id,
            name: data.name,
            email: data.email,
            password: data.password,
            role: data.role
          })
        });

        const result = await response.json();

        console.log("UPDATE USER:", result);

        if (!result.success) {
          throw new Error(
            result.message || "Update failed"
          );
        }

        await loadUsers();

        showToast(
          "User updated successfully"
        );

      } catch (error) {

        users[index] = oldData;

        render();

        console.error(error);

        showToast(
          error.message || "Failed to update user",
          "error"
        );
      }
    }

    async function deleteUser(id) {

      const deletedUser =
        users.find(
          x => String(x.id) === String(id)
        );

      users =
        users.filter(
          x => String(x.id) !== String(id)
        );

      render();

      try {

        const response = await fetch(USERS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            action: "delete",
            id: id
          })
        });

        const result = await response.json();

        console.log("DELETE USER:", result);

        if (!result.success) {
          throw new Error(
            result.message || "Delete failed"
          );
        }

        await loadUsers();

        showToast(
          "User deleted successfully"
        );

      } catch (error) {

        if (deletedUser) {
          users.unshift(deletedUser);
        }

        render();

        console.error(error);

        showToast(
          error.message || "Failed to delete user",
          "error"
        );
      }
    }

    async function loadSales() {
      try {
        salesLoaded = false;

        const response = await fetch(SALES_URL);
        const result = await response.json();
        sales = result.leads || [];
        dataLoaded = true;
        salesLoaded = true;
        render();
      } catch (error) {
        salesLoaded = true;
        render();
        console.error("Sales Load Error:", error);
      }
    }

    async function addClient(data) {
      await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "add",
          clientName: data.name,
          business: data.business,
          phone: data.phone,
          instagram: data.instagram,
          reels: Number(data.reels),
          pricePerReel: Number(data.ppr),
          image: data.image || ""
        })
      });
      await loadGoogleSheetData();
      showToast("Client added successfully");
    }

    async function updateClient(id, data) {
      await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "update",
          id: id,
          clientName: data.name,
          business: data.business,
          phone: data.phone,
          instagram: data.instagram,
          reels: Number(data.reels),
          pricePerReel: Number(data.ppr),
          image: data.image || ""
        })
      });
      await loadGoogleSheetData();
      showToast("Client updated successfully");
    }

    async function deleteClient(id) {
      await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "delete",
          id: id
        })
      });
      await loadGoogleSheetData();
      showToast("Client deleted successfully");
    }

    async function addSale(data) {
      const tempLead = {
        id: Date.now(),
        createdDate: new Date().toLocaleDateString(),
        ...data
      };
      sales.unshift(tempLead);
      render();
      try {
        await fetch(SALES_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "add",
            category: data.category,
            companyName: data.companyName,
            contactPerson: data.contactPerson,
            phoneNumber: data.phoneNumber,
            notes: data.notes,
            contacted: data.contacted
          })
        });
        showToast("Lead added successfully");
      } catch (error) {
        sales = sales.filter(x => x.id !== tempLead.id);
        render();
        showToast("Failed to add lead", "error");
        console.error(error);
      }
    }

    async function updateSale(id, data) {
      const index = sales.findIndex(x => String(x.id) === String(id));
      if (index === -1) return;
      const oldData = { ...sales[index] };
      sales[index] = { ...sales[index], ...data };
      render();
      try {
        await fetch(SALES_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "update",
            id,
            category: data.category,
            companyName: data.companyName,
            contactPerson: data.contactPerson,
            phoneNumber: data.phoneNumber,
            notes: data.notes,
            contacted: data.contacted
          })
        });
        showToast("Lead updated successfully");
      } catch (error) {
        sales[index] = oldData;
        render();
        showToast("Failed to save changes", "error");
        console.error(error);
      }
    }

    async function deleteSale(id) {
      const deletedLead = sales.find(x => String(x.id) === String(id));
      sales = sales.filter(x => String(x.id) !== String(id));
      render();
      try {
        await fetch(SALES_URL, {
          method: "POST",
          body: JSON.stringify({
            action: "delete",
            id
          })
        });
        showToast("Lead deleted successfully");
      } catch (error) {
        sales.unshift(deletedLead);
        render();
        showToast("Failed to delete lead", "error");
        console.error(error);
      }
    }

    async function handleSalesImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (e) => {
        const workbook = XLSX.read(e.target.result, { type: "array" });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(sheet);
        if (!rows.length) {
          showToast("No records found", "error");
          return;
        }
        showToast(`Importing ${rows.length} leads...`);
        for (const row of rows) {
          await addSale({
            category: row.Category || "",
            companyName: row.CompanyName || row.Company || "",
            contactPerson: row.ContactPerson || "",
            phoneNumber: row.PhoneNumber || row.Phone || "",
            notes: row.Notes || "",
            contacted: row.Contacted || "No"
          });
        }
        showToast(`${rows.length} leads imported successfully`);
      };
      reader.readAsArrayBuffer(file);
    }

    // ==============================
    // RENDER FUNCTIONS
    // ==============================
    function render() {
      const currentUser = getCurrentUser();

      if (
        currentUser?.role === "sales" &&
        page !== "sales"
      ) {
        page = "sales";
      }
      if (isLoggedIn()) {
        resetLogoutTimer();
      }
      const root = document.getElementById('root');
      if (!isLoggedIn()) {

        root.innerHTML =
          renderLogin() +
          (sessionExpired
            ? renderSessionExpiredModal()
            : "");

        attachLogin();
        attachSessionExpiredEvents();

        return;
      }
      root.innerHTML = `
        <div class="app">
          ${renderSidebar()}
          <div class="main">
            ${renderTopbar()}
            <div class="content">
              ${page === 'dashboard' ? renderDashboard() : page === 'clients' ? renderClients() : page === 'analytics' ? renderAnalytics() : page === 'users' ? renderUsers() : page === 'sales' ? renderSales() : ''}
            </div>
          </div>
        </div>
        ${modal ? renderModal() : ''}
        ${mobileMenuOpen ? renderMobileMenu() : ''}
        ${toast ? `<div class="toast ${toast.type}"><img class="toast-icon" src="../assets/icons/${toast.type === 'success' ? 'check.svg' : 'close.svg'}" alt="${toast.type}"><span>${toast.msg}</span></div>` : ''}
      `;
      attachEvents();
      if (page === 'analytics') initCharts();
    }

    function renderLogin() {
      return `<div class="login-wrap"><div class="login-card"><div class="login-logo"><a href="#" class="logo"><div><img src="../assets/logo.svg" alt="ReelScale Logo" style="width:100%; height:20px;"></div></a></div><div class="login-title">Welcome back</div><div class="login-sub">Sign in to manage your clients & revenue</div><div id="login-err" style="display:none" class="login-error">Invalid credentials. Please try again.</div><div class="form-group"><label class="form-label">Email</label><input class="form-input" id="l-email" type="email" placeholder="Enter your email" autocomplete="off"></div><div class="form-group"><label class="form-label">Password</label><input class="form-input" id="l-pass" type="password" placeholder="Enter your password" autocomplete="off"></div><button class="btn btn-primary al-c" id="login-btn" style="width:100%;padding:12px;margin-top:32px;font-size:14px">Sign In</button></div></div>`;
    }

    function renderSessionExpiredModal() {
      return `
    <div class="modal-overlay">
      <div class="modal" style="max-width:420px">

        <div class=modal-icon>
          <img src="../assets/icons/log-out.svg" alt="Info" width="24" height="24">
        </div>

        <div class="modal-header">
          <div class="modal-title">
            Session Expired
          </div>
        </div>

        <div style="
          color: var(--muted);
          font-size: var(--text-sm);
          line-height: 1.6;
          margin-bottom: 24px;
        ">
          Your session expired due to inactivity.
          Please sign in again to continue using ReelScale.
        </div>

        <div class="form-footer">
          <button
            id="session-login-btn"
            class="btn btn-primary"
          >
            Login Again
          </button>
        </div>

      </div>
    </div>
  `;
    }

    function renderSidebar() {
      const user = getCurrentUser();
      const nav = user?.role === "sales" ? [{ id: "sales", icon: "../assets/icons/nav-sales.svg", label: "Sales" }] : [{ id: "dashboard", icon: "../assets/icons/nav-dashboard.svg", label: "Dashboard" }, { id: "clients", icon: "../assets/icons/nav-clients.svg", label: "Clients" }, { id: "analytics", icon: "../assets/icons/nav-analytics.svg", label: "Analytics" }, { id: "users", icon: "../assets/icons/nav-users.svg", label: "Users" }, { id: "sales", icon: "../assets/icons/nav-sales.svg", label: "Sales" }];
      return `<div class="sidebar"><div class="dashboard-logo"><img src="../assets/logo.svg" alt="ReelScale Logo"><div class="logo-sub">Reel Production House</div></div><div class="nav">${nav.map(n => `<button class="nav-item${page === n.id ? ' active' : ''}" data-page="${n.id}"><img src="${n.icon}" alt="${n.label}" class="nav-icon"><span>${n.label}</span></button>`).join('')}</div><div class="sidebar-footer"><div class="user-pill"><div class="user-avatar">A</div><div class="user-info"><div class="user-name">${user?.name || ''}</div><div class="user-role">${user?.email || ''}</div></div><img src="../assets/icons/log-out.svg" alt="Logout" class="logout-btn" id="logout-btn" title="Logout"></div></div></div>`;
    }

    function renderMobileMenu() {
      const user = getCurrentUser();
      const isSales =
        String(user?.role || "")
          .trim()
          .toLowerCase() === "sales";

      const nav = isSales
        ? [
          {
            id: "sales",
            icon: "../assets/icons/nav-sales.svg",
            label: "Sales"
          }
        ]
        : [
          {
            id: "dashboard",
            icon: "../assets/icons/nav-dashboard.svg",
            label: "Dashboard"
          },
          {
            id: "clients",
            icon: "../assets/icons/nav-clients.svg",
            label: "Clients"
          },
          {
            id: "analytics",
            icon: "../assets/icons/nav-analytics.svg",
            label: "Analytics"
          },
          {
            id: "users",
            icon: "../assets/icons/nav-users.svg",
            label: "Users"
          },
          {
            id: "sales",
            icon: "../assets/icons/nav-sales.svg",
            label: "Sales"
          }
        ];
      return `<div class="mobile-menu-overlay" id="mobile-menu-overlay"><div class="mobile-menu"><div class="mobile-menu-header"><img src="../assets/logo.svg" height="22"><button id="mobile-close-btn" class="mobile-close-btn"><img src="../assets/icons/close.svg" alt="Close" width="18" height="18"></button></div>${nav.map(item => `<button class="mobile-nav-item ${page === item.id ? "active" : ""}" data-page="${item.id}"><img src="${item.icon}" width="18">${item.label}</button>`).join("")}</div></div>`;
    }

    function renderTopbar() {
      const titles = { dashboard: 'Dashboard', clients: 'Clients', analytics: 'Revenue Analytics', users: 'Users', sales: 'Sales' };
      const subs = { dashboard: 'Overview of your business metrics', clients: 'Manage all client accounts', analytics: 'Detailed revenue insights', users: 'Manage system users', sales: 'Manage sales leads' };
      return `<div class="topbar"><div class="mobile-topbar-left"><button id="mobile-menu-btn" class="mobile-menu-btn"><img src="../assets/icons/menu.svg" width="20" alt="Menu"></button><div><div class="page-title">${titles[page] || ''}</div><div class="page-sub">${subs[page] || ''}</div></div></div>${page === 'clients' ? `<div class="topbar-actions"><button class="btn btn-primary" id="add-client-btn"><span><img src="../assets/icons/add.svg" alt="Add" style="width:20px;"></span><span>Add Client</span></button></div>` : ''}${page === 'sales' ? `<div class="topbar-actions sales-topbar-actions"><button class="btn btn-ghost" id="import-sales-btn"><img src="../assets/icons/upload.svg" width="18">Import XLS</button><button class="btn btn-primary" id="add-sale-btn"><img src="../assets/icons/add.svg" width="18">Add Lead</button><input type="file" id="sales-file-input" accept=".xlsx,.xls,.csv" style="display:none;"></div>` : ''}${page === 'users' ? `<button class="btn btn-primary" id="add-user-btn"><img src="../assets/icons/add.svg" width="18">Add User</button>` : ''}</div>`;
    }

    function renderDashboard() {
      const s = stats();
      if (!dataLoaded) {
        return `
    <div class="dashboard-loader-wrap">
  <div class="dashboard-loader">
    <div class="loader">
      <div class="bar1"></div>
      <div class="bar2"></div>
      <div class="bar3"></div>
      <div class="bar4"></div>
      <div class="bar5"></div>
      <div class="bar6"></div>
      <div class="bar7"></div>
      <div class="bar8"></div>
      <div class="bar9"></div>
      <div class="bar10"></div>
      <div class="bar11"></div>
      <div class="bar12"></div>
    </div>
    <div class="loader-text">Loading Dashboard</div>
  </div>
</div>

    function initCharts() {
      const sorted = [...clients].sort((a, b) => getRevenue(b) - getRevenue(a));
      const ctx = document.getElementById('rev-chart');
      if (!ctx) return;
      if (window._reelChart) window._reelChart.destroy();
      window._reelChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: sorted.map(c => c.name.split(' ')[0]),
          datasets: [{
            label: 'Revenue (₹)',
            data: sorted.map(c => getRevenue(c)),
            backgroundColor: sorted.map((_, i) => i === 0 ? 'oklch(0.75 0.10 85 / 0.7)' : 'oklch(52% 0.22 25 / 0.5)'),
            borderColor: sorted.map((_, i) => i === 0 ? 'oklch(0.75 0.10 85)' : 'oklch(62.944% 0.25583 25.982)'),
            borderWidth: 1.5,
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => '₹' + ctx.raw.toLocaleString('en-IN') } } },
          scales: {
            x: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 11 } } },
            y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: 'rgba(255,255,255,0.45)', font: { size: 11 }, callback: v => '₹' + v.toLocaleString('en-IN') } }
          }
        }
      });
    }

    function attachLogin() {
      document.getElementById('login-btn')?.addEventListener('click', () => {
        const email = document.getElementById('l-email').value.trim();
        const password = document.getElementById('l-pass').value;
        if (login(email, password)) {
          const user = getCurrentUser();
          page = user.role === "sales" ? "sales" : "dashboard";
          render();
          startActivityTracking();
        } else {
          document.getElementById('login-err').style.display = 'block';
        }
      });
      document.getElementById('l-pass')?.addEventListener('keydown', ev => {
        if (ev.key === 'Enter') {
          document.getElementById('login-btn').click();
        }
      });
    }

    function attachSessionExpiredEvents() {

      document
        .getElementById("session-login-btn")
        ?.addEventListener("click", () => {

          sessionExpired = false;

          const email =
            document.getElementById("l-email");

          if (email) {
            email.focus();
          }

          render();
        });
    }

    function attachModalEvents() {
      const updatePreview = () => {
        const r = parseInt(document.getElementById('f-reels')?.value) || 0;
        const p = parseInt(document.getElementById('f-ppr')?.value) || 0;
        const el = document.getElementById('rev-preview');
        if (el) el.textContent = '₹' + (r * p).toLocaleString('en-IN');
      };
      document.getElementById('f-reels')?.addEventListener('input', updatePreview);
      document.getElementById('f-ppr')?.addEventListener('input', updatePreview);
      updatePreview();
      document.getElementById('modal-close')?.addEventListener('click', () => { modal = null; render(); });
      document.getElementById('modal-cancel')?.addEventListener('click', () => { modal = null; render(); });
      document.getElementById('modal-overlay')?.addEventListener('click', e => { if (e.target.id === 'modal-overlay') { modal = null; render(); } });
      document.getElementById('modal-save')?.addEventListener('click', () => {
        const data = {
          name: document.getElementById('f-name').value.trim(),
          business: document.getElementById('f-biz').value.trim(),
          phone: document.getElementById('f-phone').value.trim(),
          instagram: document.getElementById('f-instagram').value.trim(),
          reels: document.getElementById('f-reels').value,
          ppr: document.getElementById('f-ppr').value,
          image: document.getElementById('f-image').value.trim()
        };
        if (!data.name || !data.business) {
          showToast('Name and business are required', 'error');
          return;
        }
        if (modal === 'edit') updateClient(editId, data);
        else addClient(data);
        modal = null;
        render();
      });
    }

    function attachEvents() {
      document.querySelectorAll('[data-page]').forEach(b => b.addEventListener('click', () => {
        const user = getCurrentUser();
        if (user.role === "sales" && b.dataset.page !== "sales") {
          return;
        }
        page = b.dataset.page;

        localStorage.setItem(
          "reelscale_current_page",
          page
        );

        mobileMenuOpen = false;
        search = '';
        render();
      }));
      document.querySelectorAll(".toggle-password")
        .forEach(btn => {

          btn.addEventListener("click", () => {

            const input =
              document.getElementById(
                btn.dataset.target
              );

            if (!input) return;

            input.type =
              input.type === "password"
                ? "text"
                : "password";

            btn.src =
              input.type === "password"
                ? "../assets/icons/eye.svg"
                : "../assets/icons/eye-off.svg";
          });

        });

      document.querySelector(".create-user-btn")
        ?.addEventListener("click", async () => {

          const name =
            document.getElementById("new-user-name")
              ?.value.trim();

          const email =
            document.getElementById("new-user-email")
              ?.value.trim();

          const password =
            document.getElementById("new-user-password")
              ?.value.trim();

          const role =
            document.getElementById("new-user-role")
              ?.value;

          if (!name || !email || !password) {

            showToast(
              "All fields are required",
              "error"
            );

            return;
          }

          await addUser({
            name,
            email,
            password,
            role
          });

          newUserRow = false;
        });

      document.querySelector(".cancel-user-btn")
        ?.addEventListener("click", () => {

          newUserRow = false;
          render();

        });

      document.querySelectorAll(".user-name-input")
        .forEach(input => {

          input.addEventListener("blur", async () => {

            const user =
              users.find(
                x => String(x.id) === input.dataset.id
              );

            if (!user) return;

            if (user.name === input.value) return;

            await updateUser(user.id, {
              ...user,
              name: input.value
            });

          });

        });
      document.querySelectorAll(".user-email-input")
        .forEach(input => {

          input.addEventListener("blur", async () => {

            const user =
              users.find(
                x => String(x.id) === input.dataset.id
              );

            if (!user) return;

            if (user.email === input.value) return;

            await updateUser(user.id, {
              ...user,
              email: input.value
            });

          });

        });

      document.querySelectorAll(".user-password-input")
        .forEach(input => {

          input.addEventListener("blur", async () => {

            const user =
              users.find(
                x => String(x.id) === input.dataset.id
              );

            if (!user) return;

            if (user.password === input.value) return;

            await updateUser(user.id, {
              ...user,
              password: input.value
            });

          });

        });

      document.querySelectorAll(".user-role-input")
        .forEach(select => {

          select.addEventListener("change", async () => {

            const user =
              users.find(
                x => String(x.id) === select.dataset.id
              );

            if (!user) return;

            await updateUser(user.id, {
              ...user,
              role: select.value
            });

          });

        });

      document.querySelectorAll(".delete-user")
        .forEach(btn => {

          btn.addEventListener("click", async () => {

            await deleteUser(btn.dataset.id);

          });

        });

      document.querySelectorAll(".call-sale").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const lead = sales.find(x => String(x.id) === String(id));
          if (!lead) return;
          if (lead.contacted === "Yes") return;
          updateSale(id, { ...lead, contacted: "Yes" });
        });
      });

      document.querySelectorAll(".whatsapp-sale").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          const lead = sales.find(x => String(x.id) === String(id));
          if (!lead) return;
          await updateSale(id, { ...lead, contacted: "Yes" });
        });
      });

      document.getElementById("import-sales-btn")?.addEventListener("click", async () => {

        await loadXLSXLibrary();

        document.getElementById("sales-file-input").click();

      });

      document.getElementById("sales-file-input")?.addEventListener("change", handleSalesImport);

      document.getElementById("mobile-menu-btn")?.addEventListener("click", () => {
        mobileMenuOpen = true;
        render();
      });

      document.getElementById("mobile-close-btn")?.addEventListener("click", () => {
        mobileMenuOpen = false;
        render();
      });

      document.getElementById("mobile-menu-overlay")?.addEventListener("click", (e) => {
        if (e.target.id === "mobile-menu-overlay") {
          mobileMenuOpen = false;
          render();
        }
      });

      document.querySelector(".cancel-lead-btn")?.addEventListener("click", () => {
        newLeadRow = false;
        render();
        showToast("Lead creation cancelled");
      });

      document.querySelector(".create-lead-btn")?.addEventListener("click", async () => {
        const company = document.getElementById("new-company")?.value.trim();
        const phone = document.getElementById("new-phone")?.value.trim();
        const notes = document.getElementById("new-note")?.value.trim();
        const contacted = document.getElementById("new-contacted")?.checked ? "Yes" : "No";
        if (!company) {
          showToast("Company Name is required", "error");
          return;
        }
        await addSale({ category: "", companyName: company, contactPerson: "", phoneNumber: phone, notes, contacted });
        newLeadRow = false;
      });

      document.querySelectorAll(".delete-sale").forEach(btn => {
        btn.addEventListener("click", async () => {
          const id = btn.dataset.id;
          await deleteSale(id);
        });
      });

      document.getElementById("add-sale-btn")?.addEventListener("click", () => {
        if (newLeadRow) return;
        newLeadRow = true;
        render();
      });

      document.querySelectorAll(".note-input").forEach(input => {
        input.addEventListener("blur", async () => {
          const id = input.dataset.id;
          const lead = sales.find(x => String(x.id) === String(id));
          if (input.value === (lead.notes || "")) return;
          await updateSale(id, { ...lead, notes: input.value });
          showToast("Note updated");
        });
      });

      document.querySelectorAll(".company-input").forEach(input => {
        input.addEventListener("blur", async () => {
          const id = input.dataset.id;
          const lead = sales.find(x => String(x.id) === String(id));
          if (input.value === lead.companyName) return;
          await updateSale(id, { ...lead, companyName: input.value });
        });
      });

      document.querySelectorAll(".phone-input").forEach(input => {
        input.addEventListener("blur", async () => {
          const id = input.dataset.id;
          const lead = sales.find(x => String(x.id) === String(id));
          if (input.value === lead.phoneNumber) return;
          await updateSale(id, { ...lead, phoneNumber: input.value });
        });
      });

      document.querySelectorAll(".contacted-toggle").forEach(cb => {
        cb.addEventListener("change", async () => {
          const lead = sales.find(x => String(x.id) === cb.dataset.id);
          await updateSale(lead.id, { ...lead, contacted: cb.checked ? "Yes" : "No" });
        });
      });

      document.getElementById('logout-btn')?.addEventListener('click', () => {
        clearTimeout(logoutTimer);
        localStorage.removeItem("reelscale_auth");
        localStorage.removeItem("reelscale_user");
        window.location.href = "login.html";
        localStorage.removeItem("reelscale_current_page");

      });

      document.getElementById('add-client-btn')?.addEventListener('click', () => {
        modal = 'add';
        editId = null;
        render();
        attachModalEvents();
      });

      document.getElementById('add-user-btn')?.addEventListener('click', () => {

        if (newUserRow) return;

        newUserRow = true;
        render();

      });

      document.getElementById('search-input')?.addEventListener('input', e => {
        search = e.target.value;
        const cursorPos = e.target.selectionStart;
        render();
        requestAnimationFrame(() => {
          const input = document.getElementById('search-input');
          if (input) {
            input.focus();
            input.setSelectionRange(cursorPos, cursorPos);
          }
        });
      });

      document.querySelectorAll('[data-sort]').forEach(b => b.addEventListener('click', () => {
        if (sortKey === b.dataset.sort) sortDir *= -1;
        else {
          sortKey = b.dataset.sort;
          sortDir = -1;
        }
        render();
      }));

      document.querySelectorAll('.edit-client').forEach(b => b.addEventListener('click', () => {
        editId = +b.dataset.id;
        modal = 'edit';
        render();
        attachModalEvents();
      }));

      document.querySelectorAll('.del-client').forEach(b => b.addEventListener('click', () => {
        if (confirm('Delete this client?')) {
          deleteClient(+b.dataset.id);
          render();
        }
      }));

      if (modal) attachModalEvents();
    }

    // ==============================
    // INITIALIZATION
    // ==============================
    async function init() {

      const user = getCurrentUser();

      const savedPage =
        localStorage.getItem(
          "reelscale_current_page"
        );

      if (user?.role === "sales") {

        page = "sales";

      } else {

        page =
          savedPage || "dashboard";

      }
      render();

      loadGoogleSheetData();
      loadUsers();
      loadSales();
    }

    init();

    if (isLoggedIn()) {
      startActivityTracking();
    }
  </script>
  <script src="js/auth.js"></script>
  <script src="js/services/users.js"></script>
  <script src="js/services/clients.js"></script>
  <script src="js/services/sales.js"></script>
  <script>
    if (!isLoggedIn()) {
      window.location.href = "login.html";
    }
  </script>
</body>

</html>
